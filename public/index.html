<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Kryžiukų-nuliukų žaidimas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --green:  #4ade80;
      --pink:   #f472b6;
      --bg:     #0d1117;
      --card:   #161b22;
      --border: #30363d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #e6edf3;
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px;
    }

    /* ---- ANTRAŠTĖ ---- */
    h1 {
      font-size: 1.3rem;
      color: var(--green);
      text-shadow: 0 0 18px rgba(74,222,128,.8), 3px 3px 0 #166534;
      letter-spacing: 3px;
      text-align: center;
      line-height: 1.6;
    }

    /* ---- REZULTATAI ---- */
    .scoreboard {
      display: flex;
      gap: 40px;
    }

    .score-box {
      text-align: center;
      font-size: 0.55rem;
      color: #6e7681;
      letter-spacing: 1px;
    }

    .score-val {
      font-size: 2rem;
      display: block;
      margin-top: 8px;
    }

    .score-x { color: var(--green); text-shadow: 0 0 10px var(--green); }
    .score-o { color: var(--pink);  text-shadow: 0 0 10px var(--pink);  }

    /* ---- STATUSAS ---- */
    #status {
      font-size: 0.55rem;
      letter-spacing: 2px;
      color: #8b949e;
      min-height: 1.4rem;
      text-align: center;
    }

    /* ---- LENTA ---- */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows:    repeat(3, 100px);
      gap: 8px;
    }

    .cell {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      border-color: var(--green);
      background: #1a2e1c;
    }

    .cell.taken { cursor: default; }

    .cell.x {
      color: var(--green);
      text-shadow: 0 0 14px var(--green);
    }

    .cell.o {
      color: var(--pink);
      text-shadow: 0 0 14px var(--pink);
    }

    .cell.winner-cell {
      border-color: gold;
      background: #2a2400;
      animation: shine .6s infinite alternate;
    }

    @keyframes shine {
      from { box-shadow: 0 0 8px gold; }
      to   { box-shadow: 0 0 22px gold; }
    }

    /* Bėgantis kryžiukas */
    .cell.runner {
      border-color: var(--green);
      background: #1a2e1c;
      animation: blink .16s infinite;
    }

    @keyframes blink {
      0%,100% { background: #1a2e1c; }
      50%      { background: #22c55e28; }
    }

    /* ---- MYGTUKAI ---- */
    .btn-row { display: flex; gap: 12px; }

    button {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: #e6edf3;
      cursor: pointer;
      letter-spacing: 1px;
      transition: border-color .15s, background .15s;
    }

    button:hover { border-color: var(--green); background: #1a2e1c; }
  </style>
</head>
<body>

  <h1>❌ KRYŽIUKAI<br>NULIUKAI ⭕</h1>

  <div class="scoreboard">
    <div class="score-box">
      ❌ ŽAIDĖJAS X
      <span class="score-val score-x" id="scoreX">0</span>
    </div>
    <div class="score-box">
      ⭕ ŽAIDĖJAS O
      <span class="score-val score-o" id="scoreO">0</span>
    </div>
  </div>

  <div id="status">Laukiama...</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div class="btn-row">
    <button id="btnReset">🔄 Iš naujo</button>
  </div>

<script>
// ================================================================
//  MODELIS – žaidimo būsena
// ================================================================

const state = {
  board:         Array(9).fill(null),
  currentPlayer: 'X',
  winner:        null,
  gameOver:      false,
  scores:        { X: 0, O: 0 },
};

// ================================================================
//  LOGIKA
// ================================================================

function tikrintiLaimėtoją(board) {
  const linijos = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8],   // eilutės
    [0, 3, 6], [1, 4, 7], [2, 5, 8],   // stulpeliai
    [0, 4, 8], [2, 4, 6],              // įstrižainės
  ];

  for (const [a, b, c] of linijos) {
    if (
      board[a] !== null &&
      board[a] === board[b] &&
      board[b] === board[b]            // KLAIDA: turėtų būti board[c]
    ) {
      return { žaidėjas: board[a], linija: [a, b, c] };
    }
  }
  return null;
}

function atliktiEjimą(index) {
  if (state.board[index] !== null || state.gameOver) return;

  state.board[index] = state.currentPlayer;

  const rezultatas = tikrintiLaimėtoją(state.board);

  if (rezultatas) {
    state.winner  = rezultatas.žaidėjas;
    state.gameOver = true;
    state.scores[state.winner]++;
    atvaizduoti(rezultatas.linija);
  } else if (state.board.every(l => l !== null)) {
    state.gameOver = true;
    atvaizduoti();
  } else {
    // Perjungti žaidėją
    state.currentPlayer = state.currentPlayer === 'X' ? 'X' : 'O';   // KLAIDA: visada lieka 'X'
    atvaizduoti();
  }
}

function resetZaidima() {
  state.board         = Array(9).fill(null);
  state.currentPlayer = 'X';
  state.winner        = null;
  state.gameOver      = false;
  atvaizduoti();
}

// ================================================================
//  VAIZDAS (View)
// ================================================================

const cells  = Array.from(document.querySelectorAll('.cell'));
const status = document.getElementById('status');

function atvaizduoti(laimėjusiLinija = []) {
  cells.forEach((cell, i) => {
    const val      = state.board[i];
    cell.textContent = val === 'X' ? '✕' : val === 'O' ? '◯' : '';
    cell.className   = 'cell' +
      (val ? ' taken ' + val.toLowerCase() : '') +
      (laimėjusiLinija.includes(i) ? ' winner-cell' : '');
  });

  document.getElementById('scoreX').textContent = state.scores.X;
  document.getElementById('scoreO').textContent = state.scores.O;

  if (state.winner) {
    status.textContent = `🏆 Laimėjo žaidėjas ${state.winner}!`;
  } else if (state.gameOver) {
    status.textContent = '🤝 Lygiosios!';
  } else {
    status.textContent = `Ėjimas: žaidėjas ${state.currentPlayer}`;
  }
}

// ================================================================
//  ANIMACIJA – demonstracija
// ================================================================

function paleidimoDemonstracija() {
  let step = 0;
  setInterval(function () {
    cells.forEach(c => {
      c.textContent = '';
      c.className   = 'cell';
    });
    cells[step].textContent = '✕';
    cells[step].className   = 'cell x runner';
    step = (step + 1) % 9;
  }, 160);
}

// ================================================================
//  ĮVYKIAI
// ================================================================

cells.forEach(cell => {
  cell.addEventListener('click', () => {
    atliktiEjimą(parseInt(cell.dataset.i));
  });
});

document.getElementById('btnReset').addEventListener('click', resetZaidima);

// ================================================================
//  PALEIDIMAS
// ================================================================

paleidimoDemonstracija();   // KLAIDA: šią eilutę reikia ištrinti
atvaizduoti();
</script>

</body>
</html>
